name: Deploy GreenOps AI to Azure

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      
      - name: Build and push Docker image
        run: |
          docker build -t greenopsai.azurecr.io/greenops:${{ github.sha }} .
          docker push greenopsai.azurecr.io/greenops:${{ github.sha }}
      
      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          containerAppName: greenops-ai
          resourceGroup: greenops-rg
          imageToDeploy: greenopsai.azurecr.io/greenops:${{ github.sha }}
          environmentVariables: |
            AZURE_OPENAI_API_KEY=${{ secrets.AZURE_OPENAI_API_KEY }}
            AZURE_OPENAI_ENDPOINT=${{ secrets.AZURE_OPENAI_ENDPOINT }}
